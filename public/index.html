<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pickle Pong</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- MAIN MENU -->
<div id="menu">
  <h1>PICKLE PONG</h1>
  <p>@ BACKYARD WESTPORT MA</p>

  <input id="nameInput" placeholder="Enter your name">

  <button onclick="showAI()">Play Backyard</button>
  <button onclick="showMulti()">Challenge Another Guest</button>
</div>

<!-- AI MENU -->
<div id="aiMenu" class="hidden">
  <h2>Select Difficulty</h2>
  <button onclick="startAI(1)">Easy</button>
  <button onclick="startAI(2)">Medium</button>
  <button onclick="startAI(3)">Hard</button>
</div>

<!-- MULTIPLAYER MENU -->
<div id="multiMenu" class="hidden">
  <h2>Play Live</h2>
  <button onclick="createGame()">Create Game</button>
  <input id="codeInput" placeholder="Enter Code">
  <button onclick="joinGame()">Join Game</button>
</div>

<!-- WAITING SCREEN -->
<div id="waitingScreen" class="hidden">
  <h2>Waiting for another guest…</h2>
  <h1 id="roomCode"></h1>
</div>

<!-- COUNTDOWN -->
<div id="countdownScreen" class="hidden">
  <h1 id="countdownText">5</h1>
</div>

<!-- GAME CANVAS -->
<canvas id="game" width="400" height="600"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
