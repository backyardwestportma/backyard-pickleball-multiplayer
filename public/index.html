<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pickle Pong</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="menu">
  <h1>PICKLE PONG</h1>
  <p>@ BACKYARD WESTPORT MA</p>

  <input id="name" placeholder="Enter your name">

  <button onclick="create()">Create Game</button>
  <input id="code" placeholder="Enter Code">
  <button onclick="join()">Join Game</button>
</div>

<div id="wait" class="hidden">
  <h2>Waiting for another guest</h2>
  <h1 id="room"></h1>
</div>

<div id="count" class="hidden">
  <h1 id="countText"></h1>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
